services:
  postgres:
    image: postgres:15
    container_name: legal-doc-postgres
    environment:
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_password_123
      POSTGRES_DB: legal_doc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: legal-doc-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:0.4.15
    container_name: legal-doc-chromadb
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chromadb_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  chromadb_data: